<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rivers Rock — Logo animé (Scène &amp; Vintage)</title>
<style>
*{margin:0;padding:0}
body{width:1080px;height:1920px;overflow:hidden;background:radial-gradient(ellipse at 50% 45%, #C9A84C 0%, #C96D4D 35%, #1A3A5C 70%, #1A5C5C 100%);display:flex;flex-direction:column;align-items:center;justify-content:center}
canvas{position:absolute;top:0;left:0;width:1080px;height:1920px}
svg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;overflow:visible}
.outer{fill:none;stroke:rgba(232,93,58,0.15);stroke-width:2}
.inner{fill:none;stroke:#fff;stroke-width:5;stroke-dasharray:300;stroke-dashoffset:300;animation:drawCircle .8s ease-out .3s forwards;filter:drop-shadow(0 0 12px rgba(232,93,58,0.6))}
.wave{fill:none;stroke:#E85D3A;stroke-width:4;stroke-linecap:round;opacity:0;animation:fadeWave .5s ease-out 1.5s forwards;filter:drop-shadow(0 0 8px rgba(232,93,58,0.8))}
@keyframes drawCircle{to{stroke-dashoffset:0}}
@keyframes fadeWave{to{opacity:1}}
.letter{font-family:'Anton','Helvetica Neue',Arial,sans-serif;font-weight:700;font-size:34px;fill:#fff;opacity:0}
.lR{animation:dropTop .4s ease-out 1.0s forwards}
.lI{animation:dropTop .4s ease-out 1.1s forwards}
.lV{animation:dropTop .4s ease-out 1.2s forwards}
.lE1{animation:dropTop .4s ease-out 1.3s forwards}
.lR2{animation:dropTop .4s ease-out 1.4s forwards}
.lS{animation:dropTop .4s ease-out 1.5s forwards}
.lROCK_R{animation:slideRight .4s ease-out 1.9s forwards}
.lROCK_O{animation:slideRight .4s ease-out 2.0s forwards}
.lROCK_C{animation:slideRight .4s ease-out 2.1s forwards}
.lROCK_K{animation:slideRight .4s ease-out 2.2s forwards}
@keyframes dropTop{0%{opacity:0;transform:translateY(-40px)}100%{opacity:1;transform:translateY(0)}}
@keyframes slideRight{0%{opacity:0;transform:translateX(200px)}100%{opacity:1;transform:translateX(0)}}
.neon-pulse{animation:pulseGlow 2s ease-in-out infinite alternate}
@keyframes pulseGlow{0%{filter:drop-shadow(0 0 8px rgba(232,93,58,0.4))}100%{filter:drop-shadow(0 0 20px rgba(232,93,58,0.9))}}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<svg viewBox="-200 -200 400 400">
  <circle class="outer" cx="0" cy="0" r="165"/>
  <circle class="inner neon-pulse" cx="0" cy="0" r="80"/>
  <path class="wave" d="M-72,0 Q-40,-20 0,0 Q40,20 72,0">
    <animate attributeName="d" dur="3s" repeatCount="indefinite"
      values="M-72,0 Q-40,-20 0,0 Q40,20 72,0;
              M-72,0 Q-40,20 0,0 Q40,-20 72,0;
              M-72,0 Q-40,-20 0,0 Q40,20 72,0"/>
  </path>
  <text x="-60" y="-52.9" text-anchor="middle" class="letter lR">R</text>
  <text x="-36" y="-71.4" text-anchor="middle" class="letter lI">I</text>
  <text x="-12" y="-79.1" text-anchor="middle" class="letter lV">V</text>
  <text x="12" y="-79.1" text-anchor="middle" class="letter lE1">E</text>
  <text x="36" y="-71.4" text-anchor="middle" class="letter lR2">R</text>
  <text x="60" y="-52.9" text-anchor="middle" class="letter lS">S</text>
  <text x="-30" y="74.2" text-anchor="middle" class="letter lROCK_R" font-size="28">R</text>
  <text x="-10" y="79.4" text-anchor="middle" class="letter lROCK_O" font-size="28">O</text>
  <text x="10" y="79.4" text-anchor="middle" class="letter lROCK_C" font-size="28">C</text>
  <text x="30" y="74.2" text-anchor="middle" class="letter lROCK_K" font-size="28">K</text>
</svg>
<script>
const c=document.getElementById('particles'),ctx=c.getContext('2d');
c.width=1080;c.height=1920;
const ps=[];
for(let i=0;i<40;i++){ps.push({x:Math.random()*1080,y:Math.random()*1920,s:Math.random()*3+1,a:Math.random()*0.06+0.01})}
const grad=ctx.createRadialGradient(540,860,0,540,860,1200);
grad.addColorStop(0,'rgba(201,168,76,0.3)');grad.addColorStop(0.4,'rgba(201,109,77,0.15)');grad.addColorStop(1,'rgba(26,58,92,0)');
function draw(){ctx.clearRect(0,0,1080,1920);
ctx.fillStyle='#1A3A5C';ctx.fillRect(0,0,1080,1920);
ctx.fillStyle=grad;ctx.fillRect(0,0,1080,1920);
for(const p of ps){ctx.beginPath();ctx.arc(p.x,p.y,p.s,0,Math.PI*2);ctx.fillStyle=`rgba(232,93,58,${p.a})`;ctx.fill();p.y-=0.4;if(p.y<0){p.y=1920;p.x=Math.random()*1080}}
requestAnimationFrame(draw)}draw();
</script>
</body>
</html>

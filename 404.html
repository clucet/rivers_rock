<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 — Rivers Rock</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter+Tight:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter Tight',sans-serif;background:#0A0A0A;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{text-align:center;padding:40px}
.hexagon{width:80px;height:80px;margin:0 auto 24px}
.hexagon svg{width:100%;height:100%}
h1{font-family:'Anton',sans-serif;font-size:72px;letter-spacing:2px;color:#FF3B00;margin-bottom:4px}
p{font-size:16px;color:rgba(255,255,255,0.5);margin-bottom:24px}
a{display:inline-block;padding:10px 28px;background:#FF3B00;color:#fff;text-decoration:none;font-family:'Anton',sans-serif;font-size:14px;letter-spacing:1px;border-radius:2px;transition:.2s}
a:hover{background:#E03500}
@media(prefers-reduced-motion){*{animation:none!important}}
</style>
</head>
<body>
<div class="container">
  <div class="hexagon">
    <svg viewBox="0 0 100 100">
      <polygon points="50,8 86.4,29 86.4,71 50,92 13.6,71 13.6,29" fill="none" stroke="#FF3B00" stroke-width="4"/>
      <polygon points="50,18 78.1,33.5 78.1,66.5 50,84 21.9,66.5 21.9,33.5" fill="none" stroke="#fff" stroke-width="2"/>
    </svg>
  </div>
  <h1>404</h1>
  <p>Page introuvable — le rock se cache ailleurs</p>
  <a href="/">Retour au site</a>
</div>
</body>
</html>

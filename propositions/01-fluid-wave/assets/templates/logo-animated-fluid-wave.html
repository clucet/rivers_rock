<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rivers Rock — Fluid Wave</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0}
body{width:1080px;height:1920px;overflow:hidden;background:radial-gradient(ellipse at 50% 40%, #1A4A3A 0%, #4A9B8E 100%);display:flex;align-items:center;justify-content:center}
canvas{position:absolute;top:0;left:0;width:1080px;height:1920px}
svg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;overflow:visible}
.wave{fill:none;stroke:#D4A843;stroke-width:4;stroke-linecap:round;opacity:0;animation:fadeW 1s ease-out .5s forwards;filter:drop-shadow(0 0 6px rgba(212,168,67,0.5))}
.wave2{fill:none;stroke:rgba(212,168,67,0.3);stroke-width:2;stroke-linecap:round;opacity:0;animation:fadeW 1s ease-out .8s forwards}
@keyframes fadeW{to{opacity:1}}
.letter{font-family:'Bebas Neue','Helvetica Neue',sans-serif;font-size:36px;fill:#fff;opacity:0}
.lR{animation:drop .5s ease-out 1.0s forwards}
.lI{animation:drop .5s ease-out 1.15s forwards}
.lV{animation:drop .5s ease-out 1.3s forwards}
.lE{animation:drop .5s ease-out 1.45s forwards}
.lR2{animation:drop .5s ease-out 1.6s forwards}
.lS{animation:drop .5s ease-out 1.75s forwards}
@keyframes drop{0%{opacity:0;transform:translateY(-30px)}100%{opacity:1;transform:translateY(0)}}
.text-rr{font-family:'Bebas Neue',sans-serif;font-size:28px;fill:#E85D3A;opacity:0;animation:fadeW .6s ease-out 2.2s forwards}
@media(max-width:640px){
  .container{padding:48px 16px}
  h1{font-size:36px}
  .members li{flex:1 1 100%}
}
</style>
</head>
<body>
<canvas id="p"></canvas>
<svg viewBox="-200 -200 400 400">
  <path class="wave" d="M-140,0 C-100,-40 -60,40 -20,0 C20,-40 60,40 100,0 C140,-40 180,40 200,0">
    <animate attributeName="d" dur="4s" repeatCount="indefinite"
      values="M-140,0 C-100,-40 -60,40 -20,0 C20,-40 60,40 100,0 C140,-40 180,40 200,0;
              M-140,0 C-100,40 -60,-40 -20,0 C20,40 60,-40 100,0 C140,40 180,-40 200,0;
              M-140,0 C-100,-40 -60,40 -20,0 C20,-40 60,40 100,0 C140,-40 180,40 200,0"/>
  </path>
  <path class="wave2" d="M-140,10 C-100,-30 -60,50 -20,10 C20,-30 60,50 100,10 C140,-30 180,50 200,10"/>
  <text x="-60" y="-52.9" text-anchor="middle" class="letter lR">R</text>
  <text x="-36" y="-71.4" text-anchor="middle" class="letter lI">I</text>
  <text x="-12" y="-79.1" text-anchor="middle" class="letter lV">V</text>
  <text x="12" y="-79.1" text-anchor="middle" class="letter lE">E</text>
  <text x="36" y="-71.4" text-anchor="middle" class="letter lR2">R</text>
  <text x="60" y="-52.9" text-anchor="middle" class="letter lS">S</text>
  <text x="0" y="90" text-anchor="middle" class="text-rr">RIVERS ROCK</text>
</svg>
<script>
const c=document.getElementById('p'),ctx=c.getContext('2d');
c.width=1080;c.height=1920;
const ps=[];
for(let i=0;i<30;i++){ps.push({x:Math.random()*1080,y:Math.random()*1920,s:Math.random()*3+1,a:Math.random()*0.04+0.01})}
function draw(){ctx.clearRect(0,0,1080,1920);
for(const p of ps){ctx.beginPath();ctx.arc(p.x,p.y,p.s,0,Math.PI*2);ctx.fillStyle='rgba(212,168,67,'+p.a+')';ctx.fill();p.y-=0.3;if(p.y<0){p.y=1920;p.x=Math.random()*1080}}
requestAnimationFrame(draw)}draw();
</script>
</body>
</html>

<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Rivers Rock — Neon Nights (Reel)</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0}
body{width:1080px;height:1920px;overflow:hidden;background:#0F0B1A;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif}
canvas{position:absolute;top:0;left:0;width:1080px;height:1920px;z-index:0}
.content{position:relative;z-index:1;text-align:center;color:#fff}
.circle{width:200px;height:200px;margin:0 auto 40px;opacity:0;animation:fadeIn .8s ease-out .3s forwards}
.circle svg{width:100%;height:100%}
.circle circle{fill:none;stroke:#00F5FF;stroke-width:4;stroke-dasharray:400;stroke-dashoffset:400;animation:drawCircle .8s ease-out .5s forwards;filter:drop-shadow(0 0 20px rgba(0,245,255,0.6))}
.circle polyline{fill:none;stroke:#FF2D95;stroke-width:3;stroke-linejoin:round;opacity:0;animation:fadeIn .4s ease-out 1.1s forwards}
@keyframes drawCircle{to{stroke-dashoffset:0}}
h1{font-size:72px;letter-spacing:6px;text-transform:uppercase;opacity:0;animation:glitchIn .8s ease-out 1.4s forwards;color:#00F5FF;text-shadow:0 0 20px rgba(0,245,255,0.4),0 0 60px rgba(0,245,255,0.2)}
@keyframes glitchIn{0%{opacity:0;transform:scale(0.8);filter:blur(4px)}100%{opacity:1;transform:scale(1);filter:blur(0)}}
.sub{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:300;letter-spacing:8px;text-transform:uppercase;color:#FF2D95;margin-top:12px;opacity:0;animation:fadeIn .6s ease-out 2.0s forwards}
.date{font-size:36px;letter-spacing:4px;margin-top:60px;opacity:0;animation:fadeIn .6s ease-out 2.6s forwards;color:#E8E0F0}
.strike{display:inline-block;color:#FF2D95;animation:flicker 3s ease-in-out infinite alternate}
@keyframes flicker{0%,90%{opacity:1}92%{opacity:0.3}94%{opacity:1}96%{opacity:0.1}100%{opacity:1}}
.lightning{width:200px;height:4px;margin:16px auto;background:linear-gradient(90deg,transparent,#FF2D95,transparent);opacity:0;animation:fadeIn .4s ease-out 2.8s forwards}
@keyframes fadeIn{to{opacity:1}}
@media(prefers-reduced-motion){*{animation:none!important;transition:none!important}}
</style></head><body>
<canvas id="c"></canvas>
<div class="content">
  <div class="circle">
    <svg viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="35"/>
      <polyline points="68,28 78,20 74,35 80,42" stroke="#FF2D95" stroke-width="3"/>
      <circle cx="50" cy="50" r="8" fill="#FF2D95"/>
    </svg>
  </div>
  <h1><span class="strike">RIVERS</span> ROCK</h1>
  <div class="sub">Neon Nights</div>
  <div class="lightning"></div>
  <div class="date">VEN 26 JUIN 2026</div>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');c.width=1080;c.height=1920;
const ps=[];
for(let i=0;i<35;i++){ps.push({x:Math.random()*1080,y:Math.random()*1920,s:Math.random()*2+1,a:Math.random()*0.06+0.02,c:Math.random()>0.5?[0,245,255]:[255,45,149]})}
function draw(){ctx.clearRect(0,0,1080,1920);
for(const p of ps){ctx.beginPath();ctx.arc(p.x,p.y,p.s,0,Math.PI*2);ctx.fillStyle='rgba('+p.c.join(',')+','+p.a+')';ctx.fill();p.y-=0.4;if(p.y<0){p.y=1920;p.x=Math.random()*1080}}
requestAnimationFrame(draw)}draw();
</script>
</body></html>

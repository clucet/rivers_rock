<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rivers Rock -- Minuit</title>
<style>
*{margin:0;padding:0}
body{width:1080px;height:1920px;overflow:hidden;background:#0D0D0D;display:flex;align-items:center;justify-content:center}
canvas{position:absolute;top:0;left:0;width:1080px;height:1920px;z-index:0}
svg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;overflow:visible;z-index:1}
.fade-in{opacity:0;animation:fadeIn .6s ease-out forwards}
@keyframes fadeIn{to{opacity:1}}
.fade-up{opacity:0;animation:fadeUp .7s ease-out forwards}
@keyframes fadeUp{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
.slide-right{opacity:0;animation:slideRight .6s ease-out forwards}
@keyframes slideRight{0%{opacity:0;transform:translateX(60px)}100%{opacity:1;transform:translateX(0)}}
.pulse{animation:pulse 3s ease-in-out infinite alternate}
@keyframes pulse{0%{opacity:0.2}100%{opacity:0.5}}
@media(prefers-reduced-motion){*{animation:none!important;transition:none!important}}
</style></head><body>
<canvas id="c"></canvas>
<svg viewBox="-200 -200 400 400">
  <g>
    <circle cx="0" cy="0" r="140" fill="none" stroke="#C9A87C" stroke-width="1" class="fade-in" style="animation-delay:.3s;opacity:0.2"/>
    <path d="M-45,-65 A55,55 0 1,1 45,-65" fill="none" stroke="#C9A87C" stroke-width="2" class="fade-in" style="animation-delay:.8s">
      <animate attributeName="d" dur="5s" repeatCount="indefinite" values="M-45,-65 A55,55 0 1,1 45,-65;M-35,-75 A45,45 0 1,1 35,-75;M-45,-65 A55,55 0 1,1 45,-65"/>
    </path>
    <circle cx="50" cy="-50" r="2" fill="#C9A87C" class="fade-in" style="animation-delay:1.6s"/>
    <circle cx="-40" cy="-70" r="1.5" fill="#C9A87C" class="fade-in" style="animation-delay:1.9s"/>
    <circle cx="60" cy="-80" r="1" fill="#C9A87C" class="fade-in" style="animation-delay:2.2s"/>
    <text x="0" y="55" text-anchor="middle" font-family="serif" font-size="20" fill="#F5F0E8" letter-spacing="6" class="fade-up" style="animation-delay:2.6s">RIVERS ROCK</text>
  </g>
</svg>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');c.width=1080;c.height=1920;
const ps=[];
for(let i=0;i<35;i++){ps.push({x:Math.random()*1080,y:Math.random()*1920,s:Math.random()*2+1,a:Math.random()*0.04+0.01})}
function draw(){ctx.clearRect(0,0,1080,1920);
for(const p of ps){ctx.beginPath();ctx.arc(p.x,p.y,p.s,0,Math.PI*2);ctx.fillStyle='rgba(201,168,124,'+p.a+')';ctx.fill();p.y-=0.25;if(p.y<0){p.y=1920;p.x=Math.random()*1080}}
requestAnimationFrame(draw)}draw();
</script>
</body></html>
